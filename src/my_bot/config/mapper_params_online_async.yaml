slam_toolbox:
  ros__parameters:
    use_sim_time: false

    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan_filtered

    mode: mapping
    debug_logging: false

    throttle_scans: 1
    transform_publish_period: 0.05
    map_update_interval: 3.0
    resolution: 0.05

    max_laser_range: 8.0
    minimum_time_interval: 0.35
    transform_timeout: 0.3
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    use_scan_matching: true
    use_scan_barycenter: true

    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.15

    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 6.0

    link_match_minimum_response_fine: 0.25
    link_scan_maximum_distance: 1.0

    do_loop_closing: true
    loop_search_maximum_distance: 4.0
    loop_match_minimum_chain_size: 12
    loop_match_maximum_variance_coarse: 2.5
    loop_match_minimum_response_coarse: 0.45
    loop_match_minimum_response_fine: 0.55

    correlation_search_space_dimension: 0.6
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.08

    loop_search_space_dimension: 6.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    distance_variance_penalty: 0.6
    angle_variance_penalty: 1.2

    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.1745
    coarse_angle_resolution: 0.01745

    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5

    use_response_expansion: true
ekf_filter_node:
  ros__parameters:
    use_sim_time: false

    frequency: 10.0
    sensor_timeout: 1.0
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    transform_time_offset: 0.0
    transform_timeout: 0.3

    print_diagnostics: true
    debug: false

    # IMPORTANT:
    # За твоя робот НЕ ползваме X/Y позиция от wheel odom.
    # Веригите приплъзват върху трева, наклон и неравности.
    # Ползваме само forward velocity от wheel odom.
    odom0: /diff_cont/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 5
    odom0_nodelay: true

    # IMU:
    # Ползваме yaw orientation + yaw rate.
    # BNO080 трябва да стабилизира посоката.
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 5
    imu0_nodelay: true
    imu0_remove_gravitational_acceleration: true

    # По-спокоен процесен шум за бавен outdoor робот.
    # Индекси:
    # x, y, z, roll, pitch, yaw,
    # vx, vy, vz, vroll, vpitch, vyaw,
    # ax, ay, az

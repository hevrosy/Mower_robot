amcl:
  ros__parameters:
    use_sim_time: false

    base_frame_id: base_link
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: /scan_filtered

    robot_model_type: nav2_amcl::DifferentialMotionModel
    tf_broadcast: true
    transform_tolerance: 1.0

    set_initial_pose: false
    always_reset_initial_pose: false

    # Outdoor / noisy lidar tuning
    min_particles: 800
    max_particles: 3000
    pf_err: 0.03
    pf_z: 0.99
    resample_interval: 2

    # Не обновяваме AMCL при всяка микровибрация.
    update_min_d: 0.08
    update_min_a: 0.12

    # Повече несигурност в odom, защото роботът е верижен и приплъзва.
    alpha1: 0.35
    alpha2: 0.25
    alpha3: 0.45
    alpha4: 0.35
    alpha5: 0.20

    # По-устойчив lidar модел за вибрации и фалшиви точки.
    laser_model_type: likelihood_field
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.08
    max_beams: 40

    z_hit: 0.65
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.25
    sigma_hit: 0.25
    lambda_short: 0.1

    # Много важно за твоя случай:
    # игнорира част от лошите beam-ове от накланяне/вибрации.
    do_beamskip: true
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    save_pose_rate: 0.5

amcl_map_client:
  ros__parameters:
    use_sim_time: false

amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: false


map_server:
  ros__parameters:
    use_sim_time: false

    # Този път може да се overwrite-ва от твоя start_mower.sh runtime файл.
    # За Raspberry използвай /home/rbt/maps/..., не /home/base/Desktop/...
    yaml_filename: /home/rbt/maps/dvor_test_01.yaml

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true


bt_navigator:
  ros__parameters:
    use_sim_time: false

    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered

    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    default_nav_to_pose_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml
    default_nav_through_poses_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml

bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: false


controller_server:
  ros__parameters:
    use_sim_time: false

    odom_topic: /odometry/filtered
    controller_frequency: 7.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5

    progress_checker_plugins: [progress_checker]
    goal_checker_plugins: [goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker

      # Роботът ти е бавен и теренът е труден, затова му даваме повече време.
      required_movement_radius: 0.05
      movement_time_allowance: 30.0

    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker

      # За робот косачка не гоним сантиметрова точност.
      # Това намалява излишното въртене и нервното поведение.
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 1.57
      stateful: true

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false

      default_critic_namespaces: [dwb_critics]

      # Бавна, но не прекалено бавна навигация.
      min_vel_x: 0.0
      max_vel_x: 0.10
      min_vel_y: 0.0
      max_vel_y: 0.0

      max_vel_theta: 0.30

      min_speed_xy: 0.0
      max_speed_xy: 0.10
      min_speed_theta: 0.0

      acc_lim_x: 0.12
      acc_lim_y: 0.0
      acc_lim_theta: 0.25

      decel_lim_x: -0.18
      decel_lim_y: 0.0
      decel_lim_theta: -0.35

      vx_samples: 10
      vy_samples: 1
      vtheta_samples: 14

      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.05

      transform_tolerance: 0.6

      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.02
      short_circuit_trajectory_evaluation: true
      stateful: true

      # Умишлено НЕ слагам RotateToGoal critic.
      # При теб той може да кара робота да се върти излишно около близки цели.
      critics:
        - Oscillation
        - BaseObstacle
        - PathAlign
        - GoalAlign
        - PathDist
        - GoalDist

      Oscillation.scale: 0.5

      BaseObstacle.scale: 0.02

      PathAlign.scale: 10.0
      PathAlign.forward_point_distance: 0.20

      GoalAlign.scale: 4.0
      GoalAlign.forward_point_distance: 0.20

      PathDist.scale: 18.0
      GoalDist.scale: 10.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false

      update_frequency: 5.0
      publish_frequency: 2.0

      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05

      transform_tolerance: 0.6

      # Размерът е по твоите текущи настройки:
      # дължина около 0.42 m, ширина около 0.55 m.
      footprint: "[[0.21, 0.275], [0.21, -0.275], [-0.21, -0.275], [-0.21, 0.275]]"

      always_send_full_costmap: true

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /scan_filtered
          data_type: LaserScan

          marking: true
          clearing: true
          inf_is_valid: false

          obstacle_min_range: 0.10
          obstacle_max_range: 2.5

          raytrace_min_range: 0.10
          raytrace_max_range: 3.5

          max_obstacle_height: 0.50

          # Scan-ът ти е около 10 Hz, това е безопасно.
          expected_update_rate: 0.3
          observation_persistence: 0.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer

        # По-голяма зона за безопасност около препятствия.
        inflation_radius: 0.40
        cost_scaling_factor: 3.0

  local_costmap_client:
    ros__parameters:
      use_sim_time: false

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false

      update_frequency: 1.0
      publish_frequency: 1.0

      global_frame: map
      robot_base_frame: base_link

      resolution: 0.05
      transform_tolerance: 0.6

      track_unknown_space: true

      footprint: "[[0.21, 0.275], [0.21, -0.275], [-0.21, -0.275], [-0.21, 0.275]]"

      always_send_full_costmap: true

      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true

      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true

        observation_sources: scan

        scan:
          topic: /scan_filtered
          data_type: LaserScan

          marking: true
          clearing: true
          inf_is_valid: false

          obstacle_min_range: 0.10
          obstacle_max_range: 2.5

          raytrace_min_range: 0.10
          raytrace_max_range: 3.5

          max_obstacle_height: 0.50

          expected_update_rate: 0.3
          observation_persistence: 0.0

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.45
        cost_scaling_factor: 3.0

  global_costmap_client:
    ros__parameters:
      use_sim_time: false

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false


planner_server:
  ros__parameters:
    use_sim_time: false

    expected_planner_frequency: 2.0
    planner_plugins: [GridBased]

    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner

      tolerance: 0.25
      use_astar: true
      allow_unknown: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


behavior_server:
  ros__parameters:
    use_sim_time: false

    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint

    cycle_frequency: 7.0

    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.6

    simulate_ahead_time: 1.0

    max_rotational_vel: 0.25
    min_rotational_vel: 0.04
    rotational_acc_lim: 0.25

    # Оставям ги, но ги правим бавни.
    # Ако пак започне да прави много spin/backup, после ще минем на BT без recovery.
    behavior_plugins:
      - spin
      - backup
      - wait

    spin:
      plugin: nav2_behaviors::Spin

    backup:
      plugin: nav2_behaviors::BackUp

    wait:
      plugin: nav2_behaviors::Wait

behavior_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false


waypoint_follower:
  ros__parameters:
    use_sim_time: false

    loop_rate: 10
    stop_on_failure: true

    waypoint_task_executor_plugin: wait_at_waypoint

    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

waypoint_follower_rclcpp_node:
  ros__parameters:
    use_sim_time: false


velocity_smoother:
  ros__parameters:
    use_sim_time: false

    smoothing_frequency: 10.0
    scale_velocities: false

    # За начало OPEN_LOOP е по-стабилно, ако odom има шум.
    feedback: OPEN_LOOP

    max_velocity: [0.10, 0.0, 0.30]
    min_velocity: [0.0, 0.0, -0.30]

    max_accel: [0.12, 0.0, 0.25]
    max_decel: [-0.18, 0.0, -0.35]

    odom_topic: /odometry/filtered
    odom_duration: 0.3

    deadband_velocity: [0.005, 0.0, 0.005]
    velocity_timeout: 1.0

velocity_smoother_rclcpp_node:
  ros__parameters:
    use_sim_time: false


lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true

    bond_timeout: 10.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0

    node_names:
      - map_server
      - amcl

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true

    bond_timeout: 10.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0

    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
controller_manager:
  ros__parameters:
    update_rate: 30

    diff_cont:
      type: diff_drive_controller/DiffDriveController

    joint_broad:
      type: joint_state_broadcaster/JointStateBroadcaster


diff_cont:
  ros__parameters:
    publish_rate: 30.0

    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: false

    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']

    wheel_separation: 0.496
    wheel_radius: 0.01606

    pose_covariance_diagonal: [0.05, 0.05, 0.1, 0.1, 0.1, 0.2]
    twist_covariance_diagonal: [0.05, 0.05, 0.1, 0.1, 0.1, 0.2]

    cmd_vel_timeout: 0.5
    publish_limited_velocity: true
    velocity_rolling_window_size: 10

    linear.x.has_velocity_limits: true
    linear.x.max_velocity: 0.12
    linear.x.min_velocity: -0.12

    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration: 0.12
    linear.x.min_acceleration: -0.12

    angular.z.has_velocity_limits: true
    angular.z.max_velocity: 0.35
    angular.z.min_velocity: -0.35

    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration: 0.30
    angular.z.min_acceleration: -0.30